<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="256" height="256">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b0764" />
      <stop offset="100%" stop-color="#0a0a0c" />
    </linearGradient>
  </defs>

  <rect width="100" height="100" rx="24" fill="url(#bg)" stroke="#9333ea" stroke-width="1.5" stroke-opacity="0.3" />
  
  <g filter="url(#glow)">
    <circle cx="50" cy="50" r="30" fill="none" stroke="#d8b4fe" stroke-width="3.5" />
    <path d="M50 20 L50 80" stroke="#d8b4fe" stroke-width="3" />
    <path d="M20 50 L80 50" stroke="#d8b4fe" stroke-width="3" />
    
    <path d="M28 29 C 43 38, 43 62, 28 71" fill="none" stroke="#d8b4fe" stroke-width="3" />
    <path d="M72 29 C 57 38, 57 62, 72 71" fill="none" stroke="#d8b4fe" stroke-width="3" />
  </g>
</svg>